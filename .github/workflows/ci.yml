name: CI Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  # 1. Job: Check official Google Code Format
  format-check:

    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21' # Matches your <maven.compiler.release>
          distribution: 'temurin'
          cache: 'maven' # Caches dependencies to speed up future workflow runs

      - name: Verify Google Format
        # Runs Spotless to ensure the codebase follows Google Style rules
        run: mvn spotless:check

  # 2. Job: Run Quarkus Unit Tests
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Unit Tests
        # Runs unit tests (skipping integration tests per 'skipITs' property in your pom)
        run: ./mvnw -Djavax.xml.accessExternalDTD=all -Djavax.xml.accessExternalSchema=all -pl='!systemtests' test
