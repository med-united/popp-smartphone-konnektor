name: Release Pipeline

permissions:
  id-token: write   # required — lets the workflow request the OIDC token
  contents: read

on:
  push:
    branches:
      - main

jobs:
  push:
    permissions:
      id-token: write   # required — lets the workflow request the OIDC token
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Print OIDC token claims
        run: |
          TOKEN=$(curl -sH "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r '.value')
          echo $TOKEN | cut -d'.' -f2 | base64 -d 2>/dev/null | jq .
          
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::765415433338:role/ecr-push-role
          aws-region: eu-central-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        run: |
          mvn package -pl server -Dquarkus.container-image.group=uhp -Dquarkus.container-image.name=popp-smartphone-konnektor -Djavax.xml.accessExternalDTD=all -Djavax.xml.accessExternalSchema=all
          docker tag uhp/popp-smartphone-konnektor:latest 765415433338.dkr.ecr.eu-central-1.amazonaws.com/uhp/popp-smartphone-konnektor:latest
          docker push 65415433338.dkr.ecr.eu-central-1.amazonaws.com/uhp/popp-smartphone-konnektor:latest
